name: WindowResizer Manual Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 1.3.4.4"
        required: true
        default: "1.3.4.4"
      build_cli:
        description: "Also build the CLI package"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build and package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Show build tools
        shell: pwsh
        run: |
          dotnet --info
          nuget help | Select-Object -First 5
          msbuild -version

      - name: Build app and installer packages
        shell: pwsh
        run: |
          .\installer\build.ps1 "${{ github.event.inputs.version }}"

      - name: Build CLI package
        if: ${{ github.event.inputs.build_cli == 'true' }}
        shell: pwsh
        run: |
          .\installer\build-cli.ps1 "${{ github.event.inputs.version }}"

      - name: Collect outputs
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $stage = "artifact-output"

          if (Test-Path $stage) {
            Remove-Item $stage -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stage | Out-Null

          Write-Host "Files in Releases:"
          if (Test-Path ".\Releases") {
            Get-ChildItem ".\Releases" -Recurse | Format-Table FullName, Length -AutoSize
            Copy-Item ".\Releases\*" $stage -Recurse -Force
          } else {
            Write-Host "No Releases folder was created."
          }

          if (Test-Path ".\publish\WindowResizer") {
            Compress-Archive -Path ".\publish\WindowResizer\*" -DestinationPath "$stage\WindowResizer-publish-$version.zip" -Force
          }

          if (Test-Path ".\publish\WindowResizer.CLI") {
            Compress-Archive -Path ".\publish\WindowResizer.CLI\*" -DestinationPath "$stage\WindowResizer.CLI-publish-$version.zip" -Force
          }

          Write-Host "Final artifact files:"
          Get-ChildItem $stage -Recurse | Format-Table FullName, Length -AutoSize

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WindowResizer-${{ github.event.inputs.version }}
          path: artifact-output/**
          if-no-files-found: error
